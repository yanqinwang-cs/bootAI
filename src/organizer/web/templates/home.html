{% extends "base.html" %}

{% block title %}Home · bootAI{% endblock %}

{% block content %}
<section aria-labelledby="home-heading" class="consumer-shell">
  <h1 id="home-heading">bootAI</h1>
  <dl class="home-status">
    <div><dt>Selected folder</dt><dd>{{ selected_folder }}</dd></div>
    <div><dt>Last scan</dt><dd>{{ last_scan_time }}</dd></div>
  </dl>

  {% include "scan_panel.html" %}

  <section class="consumer-info-panel" aria-labelledby="automatic-scans-heading">
    <h2 id="automatic-scans-heading">Automatic scans</h2>
    <p>Not configured</p>
    <a href="/scans">View scans</a>
  </section>
</section>
{% endblock %}
